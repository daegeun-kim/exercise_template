<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박민영의 운동 계획표</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  font-size: 18px;
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }
.header {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-radius: 20px;
  margin-bottom: 30px;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.header h1 { font-size: 2.2em; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
.header .subtitle { font-size: 1em; opacity: 0.7; margin-bottom: 16px; }
.header .week-info {
  display: inline-flex; gap: 20px;
  background: rgba(255,255,255,0.1);
  padding: 8px 20px; border-radius: 30px; font-size: 0.85em;
}
.days-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 900px) { .days-grid { grid-template-columns: 1fr; } }
.day-card {
  background: white; border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  transition: transform 0.3s, box-shadow 0.3s;
}
.day-card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
.card-header { padding: 24px 20px; color: white; position: relative; overflow: hidden; }

.day-1 .card-header { background: linear-gradient(135deg, #3051e1 0%, #764ba2 100%); }
.day-2 .card-header { background: linear-gradient(135deg, #d94fe8 0%, #f5576c 100%); }
.day-3 .card-header { background: linear-gradient(135deg, #12b28d 0%, #14869a 100%); }
.day-tag {
  display: inline-block; background: rgba(255,255,255,0.25);
  padding: 3px 10px; border-radius: 15px; font-size: 0.75em;
  font-weight: 700; margin-bottom: 8px; letter-spacing: 1px;
}
.card-title { font-size: 1.5em; font-weight: 800; margin-bottom: 4px; }
.card-subtitle { font-size: 0.85em; opacity: 0.85; }
.exercise-list { padding: 12px; }
.exercise-item {
  display: flex; align-items: center;
  padding: 12px 14px; margin-bottom: 8px; border-radius: 12px;
  background: #f7f8fc; cursor: pointer;
  transition: all 0.2s; gap: 10px;
  border-left: 3px solid transparent;
}
.exercise-item:last-child { margin-bottom: 0; }
.exercise-item.optional { background: #fafafa; border: 1px dashed #ddd; border-left: 3px dashed #ddd; }
.day-1 .exercise-item:hover { background: #f0eeff; border-left-color: #667eea; }
.day-2 .exercise-item:hover { background: #fff0f5; border-left-color: #f5576c; }
.day-3 .exercise-item:hover { background: #f0fbff; border-left-color: #14b894; }
.num-badge {
  min-width: 30px; height: 30px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8em; font-weight: 700; color: white; flex-shrink: 0;
  padding: 0 6px;
}
.day-1 .num-badge { background: linear-gradient(135deg, #667eea, #764ba2); }
.day-2 .num-badge { background: linear-gradient(135deg, #f093fb, #f5576c); }
.day-3 .num-badge { background: linear-gradient(135deg, #27cfa5, #1bbdaf); }
.exercise-item.optional .num-badge { opacity: 0.55; }
.exercise-info { flex: 1; min-width: 0; }
.ex-name { font-size: 0.88em; font-weight: 700; color: #2c3e50; margin-bottom: 5px; }
.ex-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.chip {
  background: white; border: 1px solid #e8e8e8; border-radius: 6px;
  padding: 2px 4px; font-size: 0.72em; color: #666; white-space: nowrap;
}
.chip.weight { color: #764ba2; border-color: #c9b5e8; background: #f5f0ff; }
.chip.reps   { color: #2980b9; border-color: #aad4ee; background: #eef7ff; }
.chip.sets   { color: #27ae60; border-color: #a9ddb9; background: #edfff4; }
.ex-arrow { color: #ccc; font-size: 1em; flex-shrink: 0; }

/* LIGHTBOX */
#lb-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,20,0.75); z-index: 999;
  align-items: center; justify-content: center;
  padding: 16px; backdrop-filter: blur(6px);
}
#lb-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.lightbox {
  background: white; border-radius: 24px;
  max-width: 650px; width: 100%; max-height: 90vh;
  overflow-y: auto; position: relative;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.lb-close {
  position: absolute; top: 14px; right: 14px;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,0,0,0.08); border: none; cursor: pointer;
  font-size: 1.1em; display: flex; align-items: center; justify-content: center;
  z-index: 10; transition: background 0.2s;
}
.lb-close:hover { background: rgba(0,0,0,0.15); }
.lb-header { padding: 26px 24px 20px; border-bottom: 1px solid #f0f0f0; }
.lb-day-tag {
  display: inline-block; padding: 3px 10px; border-radius: 10px;
  font-size: 0.72em; font-weight: 700; letter-spacing: 0.5px;
  margin-bottom: 10px; color: white;
}
.lb-title { font-size: 1.35em; font-weight: 800; color: #1a1a2e; margin-bottom: 14px; line-height: 1.3; }
.lb-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat-box { background: #f8f9ff; border-radius: 12px; padding: 12px; text-align: center; }
.stat-val { font-size: 1em; font-weight: 800; display: block; color: #2c3e50; }
.stat-lbl { font-size: 0.68em; color: #999; display: block; margin-top: 2px; }
.lb-body { padding: 20px 24px 24px; }
.muscle-tag {
  display: inline-block; background: #f0f0f7; color: #667eea;
  padding: 4px 12px; border-radius: 20px; font-size: 0.78em;
  font-weight: 600; margin-bottom: 16px;
}
.lb-illus {
  background: #f8f9fc; border-radius: 16px; padding: 16px;
  margin-bottom: 20px; display: flex; align-items: center;
  justify-content: center; min-height: 160px;
}
.lb-illus svg { max-height: 155px; width: auto; }
.lb-illus img { max-width: 100%; border-radius: 8px; object-fit: contain; }
.lb-illus.route-map { min-height: unset; background: #000; padding: 0; border-radius: 16px; overflow: hidden; }
.lb-illus.route-map img { width: 100%; max-height: none; display: block; }
.lb-section-title {
  font-size: 0.78em; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: #aaa; margin-bottom: 10px;
}
.lb-steps { list-style: none; margin-bottom: 18px; }
.lb-steps li {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 9px 0; border-bottom: 1px solid #f5f5f5;
  font-size: 0.88em; line-height: 1.55; color: #444;
}
.lb-steps li:last-child { border-bottom: none; }
.sn {
  width: 24px; height: 24px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7em; font-weight: 700; color: white; flex-shrink: 0;
}
.lb-warn {
  background: #fffbf0; border: 1px solid #ffd166; border-radius: 12px; padding: 14px 16px;
}
.lb-warn-title { font-size: 0.82em; font-weight: 700; color: #e07b00; margin-bottom: 8px; }
.lb-warn ul { list-style: none; padding: 0; }
.lb-warn ul li {
  font-size: 0.82em; color: #996300; padding: 3px 0 3px 20px; position: relative;
}
.lb-warn ul li::before { content: '⚠'; position: absolute; left: 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>💪 박민영 운동 계획표</h1>

      <span>📅 주 3회 권장</span>
    </div>
  </div>
  <div class="days-grid" id="days-grid"></div>
</div>

<div id="lb-overlay">
  <div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLB()">✕</button>
    <div id="lb-content"></div>
  </div>
</div>

function renderDays() {
  document.getElementById('days-grid').innerHTML = DAYS.map(day => {
    let req = 0;
    return `<div class="day-card ${day.cls}">
      <div class="card-header">
        <div class="day-tag">${day.label}</div>
        <div class="card-title">${day.title}</div>
        <div class="card-subtitle">${day.subtitle}</div>
      </div>
      <div class="exercise-list">
        ${day.exercises.map((ex, i) => {
          const num = ex.optional ? '선택' : ++req;
          return `<div class="exercise-item${ex.optional?' optional':''}" onclick="openLB(${day.day-1},${i})">
            <div class="num-badge">${num}</div>
            <div class="exercise-info">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-chips">
                <span class="chip weight">⚖️ ${ex.weight}</span>
                <span class="chip reps">🔄 ${ex.reps}</span>
                <span class="chip sets">📋 ${ex.sets}</span>
              </div>
            </div>
            <span class="ex-arrow">›</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function openLB(dIdx, eIdx) {
  const day = DAYS[dIdx];
  const ex = day.exercises[eIdx];
  document.getElementById('lb-content').innerHTML = `
    <div class="lb-header">
      <span class="lb-day-tag" style="background:${day.tagBg}">${day.label} · ${day.title}</span>
      <div class="lb-title">${ex.name}</div>
      <div class="lb-stats">
        <div class="stat-box"><span class="stat-val">${ex.weight}</span><span class="stat-lbl">무게</span></div>
        <div class="stat-box"><span class="stat-val">${ex.reps}</span><span class="stat-lbl">횟수 / 거리</span></div>
        <div class="stat-box"><span class="stat-val">${ex.sets}</span><span class="stat-lbl">세트</span></div>
      </div>
    </div>
    <div class="lb-body">
      <div class="muscle-tag">🎯 ${ex.muscle}</div>
      <div class="lb-illus${ex.illust==='running'?' route-map':''}">${ILLUSTS[ex.illust] || ''}</div>
      <div class="lb-section-title">운동 방법</div>
      <ul class="lb-steps">
        ${ex.steps.map((s,i) => `<li><span class="sn" style="background:${day.accent}">${i+1}</span><span>${s}</span></li>`).join('')}
      </ul>
      <div class="lb-warn">
        <div class="lb-warn-title">주의사항</div>
        <ul>${ex.cautions.map(c=>`<li>${c}</li>`).join('')}</ul>
      </div>
    </div>`;
  document.getElementById('lb-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  document.getElementById('lb-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('lb-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeLB(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

renderDays();
</script>
</body>
</html>
